<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>ScrollTrigger Title Switcher</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="teste.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div class="scroll_wrap">
        <div class="scroll_contain u-container">
            <div class="scroll_heading_wrap w-dyn-list">
                <div role="list" class="scroll_heading_list w-dyn-items">
                    <div role="listitem" class="scroll_heading_item w-dyn-item">
                        <h2 class="scroll_heading_text">Strategy</h2>
                    </div>
                    <div role="listitem" class="scroll_heading_item w-dyn-item">
                        <h2 class="scroll_heading_text">Design</h2>
                    </div>
                    <div role="listitem" class="scroll_heading_item w-dyn-item">
                        <h2 class="scroll_heading_text">Development</h2>
                    </div>
                </div>
            </div>
            <div class="scroll_paragraph_wrap w-dyn-list">
                <div role="list" class="scroll_paragraph_list w-dyn-items">
                    <div role="listitem" class="scroll_paragraph_item w-dyn-item">
                        <p>Crafting data-driven digital roadmaps for success</p>
                    </div>
                    <div role="listitem" class="scroll_paragraph_item w-dyn-item">
                        <p>Creating stunning, user-centric visual experiences</p>
                    </div>
                    <div role="listitem" class="scroll_paragraph_item w-dyn-item">
                        <p>Building robust, scalable, and secure digital solutions</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=664b4d1beb217d007803c8a1" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<script>
$(".scroll_wrap").each(function () {
    let headings = $(this).find(".scroll_heading_item");
    let paragraphs = $(this).find(".scroll_paragraph_item");
    let indexLength = headings.length - 1;
    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: $(this),
        start: "top top",
        end: "bottom bottom",
        scrub: true
      }
    });
    tl.to(headings, { yPercent: -100 * indexLength, ease: "none" });
  
    let tl2 = gsap.timeline({
      scrollTrigger: {
        trigger: $(this),
        start: "top top",
        end: "bottom bottom",
        scrub: true
      }
    });
    paragraphs.each(function (index) {
      if (index > 0) {
        tl2.set($(this), { display: "block" });
        tl2.from($(this), { opacity: 0, y: "2rem" });
      }
      if (index < indexLength) {
        tl2.to($(this), { opacity: 0 });
        tl2.set($(this), { display: "none" });
      }
    });
  });
</script>
</body>
</html>
