<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio - Teste GSAP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Hero Page -->
    <section id="hero" class="section">
        <div class="content">
            <h1 class="title title-hero">Hero Page</h1>
            <p class="description description-hero">Seção inicial de introdução.</p>
        </div>
    </section>

    <!-- Explorer -->
    <section id="explorer" class="section">
        <div class="content">
            <h1 class="title title-explorer">Explorer</h1>
            <p class="description description-explorer">Explore os projetos por categorias.</p>
        </div>
    </section>

    <!-- Featured Projects -->
    <section id="featured" class="section">
        <div class="content">
            <h1 class="title title-featured">Featured Projects</h1>
            <p class="description description-featured">Destaques e melhores projetos.</p>
        </div>
    </section>

    <!-- About Me -->
    <section id="about" class="section">
        <div class="content">
            <h1 class="title title-about">About Me</h1>
            <p class="description description-about">Conheça mais sobre mim.</p>
        </div>
    </section>

    <!-- Let's Work Together -->
    <section id="contact" class="section">
        <div class="content">
            <h1 class="title title-contact">Let's Work Together</h1>
            <p class="description description-contact">Entre em contato para trabalharmos juntos.</p>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
